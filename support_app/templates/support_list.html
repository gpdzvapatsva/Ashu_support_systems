<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>List of Support Workers</h1>

<table class="table table-bordered table-striped bg-white">
    <thead>
        <tr>
            <th>Name</th>
            <th>Surname</th>
            <th>Specialisation</th>
            <th>is_Active</th>
            <th>Date Assigned</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for supportw in supportw %}
        <tr>
            <td>{{ supportw.name}}</td>
            <td>{{ supportw.surname }}</td>
            <td>{{ supportw.specialisation }}</td>
            <td>{{  supportw.is_active }}</td>
            <td>{{ supportw.assigned_on }}</td>
            <td>{{ supportw.status }}</td>


        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
